    <!DOCTYPE html>
<html lang="Pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado da Triagem</title>
</head>
<body>

    <!-- Menu Lateral !-->
    <div class="menu">
        <div class="titulo">
            <h3>Sistema de Triagem Clínica</h3>
        </div>
        <!-- Botões de paginas do menu !-->
        <div class="Paginas"> 
            <button class="btn-dashboard">Dashboard</button>
            <button class="btn-pacientes">Pacientes</button>
            <button class="btn-avaliacoes">Avaliações</button>
            <button class="btn-relatorios">Relatórios</button>
            <button class="btn-usuarios">Usuários</button>
        </div>
        
        <!--Acesso Usuario Cabeçalho -->
        <div class="Acesso_usuario"> 
            <button class="btn-acesso_usuario">Icone</button>
        </div>

        <!-- Botão de Logout !-->
        <div class="logout">  
            <button class="btn-logout">Logout</button>
        </div>
    </div>

    <!-- Caixa Principal !-->
    <div class ="Pricipal"> 
        <div class="container_area">

            <div class="Mensagem_entrada">  
                <h3>Resultado Triagem</h3>
            </div>

            <div class="triagem_completa">

                <div class="view_paciente">        
                    <h4>Informações do Paciente</h4>
                    <p>Nome: </p>
                    <p>Idade: </p>
                    <p>Sexo: </p>
                    <p>Histórico Médico: </p>
                </div>

                <div class="analise_triagem">
                    <h4>Resultado da Triagem</h4>
                    <p>Score Calculado: </p>
                    <p>limiar: </p>
                </div>

                <div class="recomendacao_triagem">
                    <h4>Recomendações</h4>
                    <p>Recomendações baseadas no resultado da triagem.</p>
                </div>

                <div class="data_da_avaliação">
                    <h4>Data da Avaliação</h4>
                    <p>Data e hora da avaliação realizada.</p>
                </div>
            </div>

            <div class="botoes_triagem">
                <button class="btn-Salvar_Triagem">Nova Avaliação</button>
                <button class="btn-Imprimir_Avaliacao">Imprimir </button>
                <button class="btn-Voltar">Voltar </button>
            </div>

        </div>

<body>
