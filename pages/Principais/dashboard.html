<!DOCTYPE html>
<html lang="Pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
</head>
<body>

    <!-- Menu Lateral !-->
    <div class="menu">
        <div class="titulo">
            <h3>Sistema de Triagem Clínica</h3>
        </div>
        <!-- Botões de paginas do menu !-->
        <div class="Paginas"> 
            <button class="btn-dashboard">Dashboard</button>
            <button class="btn-pacientes">Pacientes</button>
            <button class="btn-avaliacoes">Avaliações</button>
            <button class="btn-relatorios">Relatórios</button>
            <button class="btn-usuarios">Usuários</button>
        </div>
        
        <!--Acesso Usuario Cabeçalho -->
        <div class="Acesso_usuario"> 
            <button class="btn-acesso_usuario">Icone</button>
        </div>

        <!-- Botão de Logout !-->
        <div class="logout">  
            <button class="btn-logout">Logout</button>
        </div>
    </div>

    <!-- Caixa Principal !-->
    <div class ="Pricipal"> 
        <div class="container_area">

            <div class="Mensagem_entrada">  
                <h3>Bem Vindo, ao modo Administrativo</h3>
            </div>

            <!-- Informações !-->
            <div class="container_Informacao">

                <!-- total de pacientes !-->
                <div class="total_pacientes">
                    <div class="icone_1">
                        <!--  icone  !-->
                    </div>
                    <div class="contagem_1">
                        <!-- Contagem-->
                    </div>
                    <h4>Total de Pacientes</h4>
                </div>

                 <!-- total de avaliações realizadas !-->
                <div class="total_avaliacoes_realizadas">
                    <div class="icone_2">
                        <!--  icone  !-->
                    </div>
                    <div class="contagem_2">
                        <!-- Contagem-->
                    </div>
                    <h4>Total de Avaliações Realizadas</h4>
                </div>

                <!-- total de encaminhamentos !-->
                <div class="encaminhamentos">
                    <div class="icone_3">
                        <!--  icone  !-->
                    </div>
                    <div class="contagem_3">
                        <!-- Contagem-->
                    </div>
                    <h4>Encaminhamentos</h4>
                </div>

                <!-- avaliações recentes !-->
                <div class="avaliacoes_recentes">
                    <div class="icone_4">
                        <!--  icone  !-->
                    </div>
                    <div class="contagem_4">
                        <!-- Contagem-->
                    </div>
                    <h4>Avaliações Recentes</h4>
                </div>

            </div>
            <!-- Acessos Rápidos !-->
            <div class="container_acessos">
                <h3>Acessos Rápidos</h3>

                <div class="acesso_rapido">

                    <!-- Cadastrar Paciente !-->
                    <div class="cadastrar_paciente">
                        <button> 
                            <div class = "icone_5">
                            <!--  icone  !-->
                            </div>
                         <h4>Cadastrar Paciente</h4>
                        </button>
                    </div>

                    <!-- Cadastrar Avaliação !-->
                    <div class="cadastrar_avaliacao">
                        <button>
                            <div class="icone_6">
                            <!--  icone  !-->
                            </div>
                         <h4>Cadastrar Avaliação</h4>
                        </button>
                    </div>
                    <!-- Cadastrar Relatório !-->
                    <div class="cadastrar_relatorio">
                        
                        <button>
                            <div class="icone_7">
                                <!--  icone  !-->
                                </div>
                            
                         <h4>Cadastrar Relatório</h4>
                        </button>
                    </div>

                     <!-- Gerenciar Usuários !-->
                    <div class="gerenciar_usuarios">
                        <button> 

                            <div class="icone_8">
                                <!--  icone  !-->

                            </div>
                    
                        <h4>Gerenciar Usuários</h4>
                        </button>
                    </div>

                </div>

            </div>
            <div class="container_avaliacoes">  

            </div>     
        </div>
    </div> 
</body>
</html>
