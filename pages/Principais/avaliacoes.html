<!DOCTYPE html>
<html lang="Pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliações</title>
</head>
<body>

    <!-- Menu Lateral !-->
    <div class="menu">
        <div class="titulo">
            <h3>Sistema de Triagem Clínica</h3>
        </div>
        <!-- Botões de paginas do menu !-->
        <div class="Paginas"> 
            <button class="btn-dashboard">Dashboard</button>
            <button class="btn-pacientes">Pacientes</button>
            <button class="btn-avaliacoes">Avaliações</button>
            <button class="btn-relatorios">Relatórios</button>
            <button class="btn-usuarios">Usuários</button>
        </div>
        
        <!--Acesso Usuario Cabeçalho -->
        <div class="Acesso_usuario"> 
            <button class="btn-acesso_usuario">Icone</button>
        </div>

        <!-- Botão de Logout !-->
        <div class="logout">  
            <button class="btn-logout">Logout</button>
        </div>
    </div>

    <!-- Caixa Principal !-->
    <div class ="Pricipal"> 
        <div class="container_area_info">

            <div class="Mensagem_entrada">
                <button>voltar icone </button>  
                <h3>Nova Avaliação</h3>
            </div>

            <!-- Informações do Paciente e Checklist de Avaliação !-->

            <div class = "info_paciente">
                <h4>Selecionar Paciente</h4>
                <label for="paciente">Paciente:</label>
                <input type="text" id="paciente" name="paciente">
            </div>

            <div class="view_paciente">        
                    <h4>Informações do Paciente</h4>
                    <p>Nome: </p>
                    <p>Idade: </p>
                    <p>Sexo: </p>
                    <p>Histórico Médico: </p>
            </div>

        <!-- Checklist de avaliação aqui -->

        <div class="checklist_avaliacao">
            <h4>Checklist de Avaliação</h4>

            <li>
            <input type="checkbox" id="task1" name="task" value="tarefa1">
            <label for="task1">Deficiência intelectual</label>
            </li>

            <li>
            <input type="checkbox" id="task2" name="task" value="tarefa2">
            <label for="task2">Face alongada/orelhas de abano</label
            </li>

            <li>
            <input type="checkbox" id="task3" name="task" value="tarefa3">
            <label for="task3">Macroorquidismo</label>
            </li>

            <li>
            <input type="checkbox" id="task4" name="task" value="tarefa4">
            <label for="task4">Hipermobilidade articular</label>
            </li>

            <li>
            <input type="checkbox" id="task5" name="task" value="tarefa5">
            <label for="task5">Dificuldades de aprendizagem</label>
            </li>

            <li>
            <input type="checkbox" id="task6" name="task" value="tarefa6">
            <label for="task6">Déficit de atenção</label>
            </li>

            <li>
            <input type="checkbox" id="task7" name="task" value="tarefa7">
            <label for="task7">Mov. repetitivos </label>
            </li>

            <li>
            <input type="checkbox" id="task8" name="task" value="tarefa8">
            <label for="task8">Atraso na fala</label>
            </li>

            <li>
            <input type="checkbox" id="task9" name="task" value="tarefa9">
            <label for="task9">Hiperatividade </label>
            </li>

            <li>
            <input type="checkbox" id="task10" name="task" value="tarefa10  ">
            <label for="task10">Evita contato visual </label>
            </li>

            <li>
            <input type="checkbox" id="task11" name="task" value="tarefa11">
            <label for="task11">Evita contato físico </label>
            </li>

            <li>
            <input type="checkbox" id="task12" name="task" value="tarefa12">
            <label for="task12">Agressividade</label>
            </li>

        <div class="Botoes_finalizar">
            <button class="btn-calcular">Finalizar Avaliação</button>
            <button class="btn-Limpar">Encaminhar Paciente</button>
        </div>


    </div>
