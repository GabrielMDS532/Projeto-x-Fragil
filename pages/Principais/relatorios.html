<!DOCTYPE html>
<html lang="Pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios</title>
</head>
<body>

    <!-- Menu Lateral !-->
    <div class="menu">
        <div class="titulo">
            <h3>Sistema de Triagem Clínica</h3>
        </div>
        <!-- Botões de paginas do menu !-->
        <div class="Paginas"> 
            <button class="btn-dashboard">Dashboard</button>
            <button class="btn-pacientes">Pacientes</button>
            <button class="btn-avaliacoes">Avaliações</button>
            <button class="btn-relatorios">Relatórios</button>
            <button class="btn-usuarios">Usuários</button>
        </div>
        
        <!--Acesso Usuario Cabeçalho -->
        <div class="Acesso_usuario"> 
            <div class="botao_acesso_usuario">
            <button class="btn-acesso_usuario">Icone</button>
            </div>
        </div>

        <!-- Botão de Logout !-->
        <div class="logout">  
            <button class="btn-logout">Logout</button>
        </div>
    </div>

    <div class ="Pricipal"> 
        <div class="container_area">

            <div class="Mensagem_entrada">
                <h3>Relatórios</h3>
                <button class="btn-gerar_relatorio">Exportar Relatório</button>
            </div>  

        <div class="filtros_relatorios">

            <!-- filtrar Pesquisa de Relatórios !-->
            <div class = container_filtros>

                <div class="filtro_data_incio">
                <label for="data_inicio">Data Início:</label>
                <input type="date" id="data_inicio" name="data_inicio">
                </div>

                <div class="filtro_data_fim">
                <label for="data_fim">Data Fim:</label>
                <input type="date" id="data_fim" name="data_fim">
                </div>

                <div class="filtro_usuario">
                    <label for="usuario">Usuário:</label>
                    <input type="text" id="usuario" name="usuario">
                </div>

                <div class = "filtro_paciente">
                    <label for="paciente">Paciente:</label>
                    <input type="text" id="paciente" name="paciente">
                </div>

                <div class="Resultado"></div>
                <label for="resultado">Resultado:</label>
                <select id="resultado" name="resultado">
                    <option value="todos_resultados">Todos</option>
                    <option value="Encaminhamento">Encaminhamento</option>
                    <option value="Normal">Normal</option>
                </select>
                </div>

            </div>

        </div>
</body>
